<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOF Team Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Radar, RadarChart, PolarGrid, PolarAngleAxis, ResponsiveContainer } = Recharts;

        // รายชื่อทีมตามข้อมูลของคุณ
        const USERS = [
            { id: 'leader', name: 'หัวหน้าทีม (Leader)', role: 'leader', avatar: '👑', color: 'bg-amber-100 text-amber-700' },
            { id: 'jenny', name: 'เจนนี่', role: 'member', avatar: '👩‍💻', color: 'bg-indigo-100 text-indigo-700' },
            { id: 'benz', name: 'เบนซ์', role: 'member', avatar: '👨‍🎨', color: 'bg-emerald-100 text-emerald-700' },
            { id: 'lukkaew', name: 'ลูกแก้ว', role: 'member', avatar: '🔮', color: 'bg-rose-100 text-rose-700' }
        ];

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('wellness');
            const [selectedMemberId, setSelectedMemberId] = useState('jenny');
            const [inputText, setInputText] = useState('');

            // ฟังก์ชันโหลด Icon ของ Lucide
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentUser, activeTab]);

            // หน้า Login
            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="max-w-4xl w-full text-center">
                            <div className="inline-block bg-indigo-600 p-4 rounded-3xl italic font-black text-3xl text-white mb-6 shadow-xl">HOF</div>
                            <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter mb-12">Talesrunner Team Portal</h1>
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                {USERS.map(user => (
                                    <button key={user.id} onClick={() => setCurrentUser(user)} className="group bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700 hover:border-indigo-500 transition-all hover:scale-105 shadow-2xl">
                                        <div className={`w-20 h-20 mx-auto rounded-[1.5rem] ${user.color} flex items-center justify-center text-4xl mb-4`}>{user.avatar}</div>
                                        <h3 className="text-white font-bold italic">{user.name}</h3>
                                        <p className="text-[10px] text-slate-500 uppercase font-black mt-1">{user.role}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <nav className="w-full md:w-72 bg-slate-900 text-white p-8 flex flex-col shrink-0">
                        <div className="flex items-center space-x-3 mb-12">
                            <div className="bg-indigo-600 px-3 py-1 rounded-xl font-black italic text-xl text-white">HOF</div>
                            <span className="font-black text-xl italic uppercase tracking-tighter text-indigo-400">Management</span>
                        </div>
                        
                        <div className="space-y-2 flex-1">
                            {[
                                { id: 'wellness', icon: 'zap', label: "Runner's Condition" },
                                { id: 'chat', icon: 'message-square', label: "Team Chat" },
                                { id: 'index', icon: 'bar-chart-3', label: "Excellence Index" }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center space-x-4 px-6 py-4 rounded-2xl transition-all font-bold ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                                    <span className="text-sm uppercase italic">{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <button onClick={() => setCurrentUser(null)} className="mt-auto flex items-center space-x-3 p-4 bg-slate-800 rounded-2xl hover:bg-rose-900 transition-colors">
                            <span className="text-xl">{currentUser.avatar}</span>
                            <span className="flex-1 text-left text-xs font-bold uppercase tracking-wider">Logout</span>
                            <i data-lucide="log-out" className="w-4 h-4 text-slate-500"></i>
                        </button>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 p-6 md:p-12 overflow-y-auto bg-slate-50">
                        <header className="mb-10 flex justify-between items-center">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800 italic uppercase">{activeTab.replace('-', ' ')}</h2>
                                <p className="text-slate-400 text-sm font-medium">ยินดีต้อนรับกลับมา, {currentUser.name}</p>
                            </div>
                        </header>

                        {activeTab === 'wellness' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Team Happiness</p>
                                    <h4 className="text-4xl font-black text-emerald-500 italic">88%</h4>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Active Runners</p>
                                    <h4 className="text-4xl font-black text-indigo-500 italic">3 / 3</h4>
                                </div>
                                <div className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Pending Tasks</p>
                                    <h4 className="text-4xl font-black text-rose-500 italic">12</h4>
                                </div>
                            </div>
                        )}

                        {activeTab === 'index' && (
                            <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 flex flex-col items-center">
                                <h3 className="text-xl font-black italic uppercase mb-8 self-start">Performance Chart</h3>
                                <div className="w-full h-80">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <RadarChart cx="50%" cy="50%" outerRadius="80%" data={[
                                            { subject: 'Teamwork', A: 80 },
                                            { subject: 'Efficiency', A: 90 },
                                            { subject: 'Growth', A: 70 },
                                            { subject: 'Curiosity', A: 85 }
                                        ]}>
                                            <PolarGrid />
                                            <PolarAngleAxis dataKey="subject" />
                                            <Radar name="Stats" dataKey="A" stroke="#4f46e5" fill="#4f46e5" fillOpacity={0.6} />
                                        </RadarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        )}

                        {activeTab === 'chat' && (
                            <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 h-[500px] flex flex-col">
                                <div className="p-6 border-b border-slate-50 font-bold italic uppercase text-slate-400 text-xs tracking-widest">
                                    Internal Team Chat
                                </div>
                                <div className="flex-1 p-6 space-y-4 overflow-y-auto">
                                    <div className="flex justify-start">
                                        <div className="bg-slate-100 p-4 rounded-2xl rounded-bl-none text-sm font-medium text-slate-700">
                                            สวัสดีทีมงานทุกคน วันนี้มีอัปเดตงาน TalesRunner นะครับ
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-slate-50 flex space-x-3">
                                    <input 
                                        type="text" 
                                        placeholder="Type something..." 
                                        className="flex-1 bg-slate-50 px-6 py-3 rounded-xl outline-none focus:ring-2 ring-indigo-500/20 text-sm font-medium"
                                    />
                                    <button className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-black uppercase text-xs">Send</button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
