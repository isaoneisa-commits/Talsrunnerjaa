<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOF - Talesrunner Team Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            Radar, RadarChart, PolarGrid, PolarAngleAxis, 
            PolarRadiusAxis, ResponsiveContainer 
        } = Recharts;

        // ดึง Icon จาก Lucide
        const Icon = ({ name, size = 20, className = "", fill = "none" }) => {
            const LucideIcon = lucide.icons[name] || lucide.icons['HelpCircle'];
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const USERS = [
            { id: 'leader', name: 'หัวหน้าทีม (Leader)', role: 'leader', avatar: '👑', color: 'bg-amber-100 text-amber-700' },
            { id: 'jenny', name: 'เจนนี่', role: 'member', avatar: '👩‍💻', color: 'bg-indigo-100 text-indigo-700' },
            { id: 'benz', name: 'เบนซ์', role: 'member', avatar: '👨‍🎨', color: 'bg-emerald-100 text-emerald-700' },
            { id: 'lukkaew', name: 'ลูกแก้ว', role: 'member', avatar: '🔮', color: 'bg-rose-100 text-rose-700' },
        ];

        const DEFAULT_STATS = [
            { subject: 'Teamwork', A: 80, fullMark: 100 },
            { subject: 'Efficiency', A: 75, fullMark: 100 },
            { subject: 'Growth Mindset', A: 85, fullMark: 100 },
            { subject: 'Curiosity', A: 70, fullMark: 100 },
        ];

        const NavItem = ({ active, onClick, iconName, label, danger }) => (
            <button onClick={onClick} className={`w-full flex items-center space-x-5 px-6 py-5 rounded-[2rem] transition-all duration-300 font-black group ${active ? (danger ? 'bg-rose-600 text-white shadow-lg' : 'bg-indigo-600 text-white shadow-lg') : 'text-slate-500 hover:bg-slate-800 hover:text-white'}`}>
                <div className={`${active ? 'scale-125' : 'group-hover:scale-125'} transition-transform duration-300`}>
                    <Icon name={iconName} />
                </div>
                <span className="text-[13px] tracking-tight italic uppercase">{label}</span>
            </button>
        );

        const StatusCard = ({ title, count, icon, color }) => (
            <div className={`p-10 rounded-[3rem] border-2 ${color} flex items-center justify-between shadow-sm transition-all hover:scale-[1.02] cursor-pointer`}>
                <div>
                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2">{title}</p>
                    <p className="text-4xl font-black text-slate-800 tracking-tighter italic">{count}</p>
                </div>
                <div className="w-16 h-16 bg-white/60 rounded-[2rem] flex items-center justify-center text-4xl shadow-inner border border-white/40">{icon}</div>
            </div>
        );

        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [activeTab, setActiveTab] = useState('wellness');
            const [selectedMemberId, setSelectedMemberId] = useState('jenny');
            const [inputText, setInputText] = useState('');
            const [activeChatId, setActiveChatId] = useState('jenny');

            const [praiseTo, setPraiseTo] = useState('');
            const [praiseText, setPraiseText] = useState('');
            const [praiseFeed, setPraiseFeed] = useState([
                { id: 1, from: 'หัวหน้าทีม (Leader)', to: 'เจนนี่', text: 'วันนี้พรีเซนต์งานได้เป๊ะมากครับ ภูมิใจสุดๆ!', timestamp: '1 ชม.ที่แล้ว', emoji: '🌟' },
                { id: 2, from: 'เบนซ์', to: 'ลูกแก้ว', text: 'ขอบคุณที่ช่วยหา Bug นะครับ รอดตายแล้วเรา', timestamp: '2 ชม.ที่แล้ว', emoji: '🙌' }
            ]);

            const [safeText, setSafeText] = useState('');
            const [safeReports, setSafeReports] = useState([
                { id: 1, text: 'ช่วงนี้รู้สึกว่าการประชุมตอนเย็นกินเวลาเลิกงานไปหน่อยครับ', timestamp: 'เมื่อวานนี้', status: 'Received' },
                { id: 2, text: 'อยากให้ทีมมีบอร์ดแชร์ความรู้กันมากกว่านี้ค่ะ', timestamp: '2 วันที่แล้ว', status: 'In Review' }
            ]);

            const [wellnessRecords] = useState([
                { id: 1, userId: 'jenny', name: 'เจนนี่', happy: 4, stress: 2, load: 5, note: 'งานแก้ด่วนเยอะมากค่ะ', timestamp: '09:00 AM' },
                { id: 2, userId: 'benz', name: 'เบนซ์', happy: 2, stress: 4, load: 3, note: 'นอนน้อย แต่นอนนะ', timestamp: '10:30 AM' },
                { id: 3, userId: 'lukkaew', name: 'ลูกแก้ว', happy: 5, stress: 1, load: 2, note: 'พลังงานล้นหลาม!', timestamp: '08:45 AM' },
            ]);

            const [teamStats, setTeamStats] = useState({
                jenny: JSON.parse(JSON.stringify(DEFAULT_STATS)),
                benz: [
                    { subject: 'Teamwork', A: 90, fullMark: 100 },
                    { subject: 'Efficiency', A: 60, fullMark: 100 },
                    { subject: 'Growth Mindset', A: 70, fullMark: 100 },
                    { subject: 'Curiosity', A: 95, fullMark: 100 },
                ],
                lukkaew: JSON.parse(JSON.stringify(DEFAULT_STATS)),
            });

            const [chatMessages, setChatMessages] = useState({
                jenny: [
                    { id: 1, sender: 'leader', text: 'เจนนี่ งานชิ้นนี้ทำได้ดีมากครับ!', timestamp: '10:00' },
                    { id: 2, sender: 'jenny', text: 'ขอบคุณค่ะหัวหน้า กำลังปั่นโปรเจกต์ต่อไปอยู่ค่ะ', timestamp: '10:05' }
                ],
                benz: [{ id: 1, sender: 'leader', text: 'เบนซ์ ไหวไหม เห็นงานโหลดเยอะ?', timestamp: '11:00' }],
                lukkaew: []
            });

            useEffect(() => { lucide.createIcons(); }, [activeTab, currentUser]);

            const handleStatChange = (subject, value) => {
                setTeamStats(prev => ({
                    ...prev,
                    [selectedMemberId]: prev[selectedMemberId].map(s => 
                        s.subject === subject ? { ...s, A: parseInt(value) } : s
                    )
                }));
            };

            const sendMessage = () => {
                if (!inputText.trim()) return;
                const newMessage = {
                    id: Date.now(),
                    sender: currentUser.id,
                    text: inputText,
                    timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };
                const targetId = currentUser.role === 'leader' ? activeChatId : 'jenny'; // จำลองส่งหาเจนนี่ถ้าเป็นลูกทีม
                setChatMessages(prev => ({
                    ...prev,
                    [targetId]: [...(prev[targetId] || []), newMessage]
                }));
                setInputText('');
            };

            if (!currentUser) {
                return (
                    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
                        <div className="max-w-4xl w-full text-center">
                            <div className="inline-block bg-indigo-600 p-4 rounded-3xl italic font-black text-3xl text-white mb-6">HOF</div>
                            <h1 className="text-5xl font-black text-white italic uppercase tracking-tighter mb-12">Talesrunner Team</h1>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {USERS.map(user => (
                                    <button key={user.id} onClick={() => setCurrentUser(user)} className="group bg-slate-800 p-8 rounded-[3rem] border border-slate-700 hover:border-indigo-500 transition-all hover:scale-105">
                                        <div className={`w-20 h-20 mx-auto rounded-[2rem] ${user.color} flex items-center justify-center text-4xl mb-4`}>{user.avatar}</div>
                                        <h3 className="text-white font-black italic uppercase">{user.name}</h3>
                                        <p className="text-[10px] text-slate-500 uppercase font-black">{user.role}</p>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50">
                    <nav className="w-full md:w-80 bg-slate-900 text-white p-10 flex flex-col shrink-0">
                        <div className="flex items-center space-x-3 mb-12">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl font-black italic text-xl">HOF</div>
                            <span className="font-black text-2xl tracking-tighter italic uppercase text-indigo-400">Talesrunner</span>
                        </div>
                        <div className="space-y-3 flex-1">
                            <NavItem active={activeTab === 'wellness'} onClick={() => setActiveTab('wellness')} iconName="Zap" label="Runner's Condition" />
                            <NavItem active={activeTab === 'praise'} onClick={() => setActiveTab('praise')} iconName="Heart" label="Praise Board" />
                            <NavItem active={activeTab === 'safe'} onClick={() => setActiveTab('safe')} iconName="ShieldAlert" label="Safe Space" danger />
                            <NavItem active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} iconName="MessageSquare" label="Coaching Chat" />
                            <NavItem active={activeTab === 'index'} onClick={() => setActiveTab('index')} iconName="BarChart3" label="Excellence Index" />
                        </div>
                        <button onClick={() => setCurrentUser(null)} className="mt-8 flex items-center space-x-4 bg-slate-800 p-4 rounded-3xl border border-white/5">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-xl">{currentUser.avatar}</div>
                            <div className="flex-1 text-left"><p className="font-black text-xs uppercase">{currentUser.name}</p></div>
                            <Icon name="LogOut" size={16} className="text-slate-500" />
                        </button>
                    </nav>

                    <main className="flex-1 p-10 overflow-y-auto h-screen">
                        {activeTab === 'wellness' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <StatusCard title="ความสุขทีม" count="3.7" icon="😊" color="bg-emerald-50 border-emerald-100" />
                                    <StatusCard title="Runner ในระบบ" count="3/3" icon="👥" color="bg-indigo-50 border-indigo-100" />
                                    <StatusCard title="ต้องการการชาร์จ" count="1" icon="⚡" color="bg-rose-50 border-rose-100" />
                                </div>
                                <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                            <tr><th className="p-8">Runner</th><th className="p-8">Happy</th><th className="p-8">Stress</th><th className="p-8">Load</th></tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {wellnessRecords.map(r => (
                                                <tr key={r.id}>
                                                    <td className="p-8 font-black flex items-center space-x-3 text-slate-700"><span>{USERS.find(u => u.id === r.userId)?.avatar}</span><span>{r.name}</span></td>
                                                    <td className="p-8 font-black text-amber-500">{r.happy}/5</td>
                                                    <td className="p-8 font-black text-rose-500">{r.stress}/5</td>
                                                    <td className="p-8 font-black text-indigo-500">{r.load}/5</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'index' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                                <div className="bg-white p-12 rounded-[3.5rem] shadow-xl">
                                    <h3 className="text-2xl font-black italic uppercase mb-8">Performance Radar</h3>
                                    <div className="h-[400px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RadarChart data={teamStats[currentUser.role === 'leader' ? selectedMemberId : currentUser.id]}>
                                                <PolarGrid />
                                                <PolarAngleAxis dataKey="subject" />
                                                <Radar name="Stats" dataKey="A" stroke="#4f46e5" fill="#4f46e5" fillOpacity={0.6} />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>
                                {currentUser.role === 'leader' && (
                                    <div className="bg-white p-12 rounded-[3.5rem] shadow-xl space-y-6">
                                        <h3 className="text-2xl font-black italic uppercase">Evaluator</h3>
                                        <select value={selectedMemberId} onChange={(e) => setSelectedMemberId(e.target.value)} className="w-full bg-slate-50 p-4 rounded-2xl font-black border-2 border-slate-100">
                                            {USERS.filter(u => u.role === 'member').map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
                                        </select>
                                        {teamStats[selectedMemberId].map(stat => (
                                            <div key={stat.subject}>
                                                <div className="flex justify-between text-xs font-black uppercase text-slate-400 mb-2"><span>{stat.subject}</span><span>{stat.A}%</span></div>
                                                <input type="range" className="w-full accent-indigo-600" value={stat.A} onChange={(e) => handleStatChange(stat.subject, e.target.value)} />
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {activeTab === 'chat' && (
                            <div className="bg-white rounded-[3rem] h-[600px] flex shadow-xl overflow-hidden">
                                <div className="w-1/3 bg-slate-50 border-r border-slate-100 p-6 space-y-2">
                                    {USERS.filter(u => u.id !== currentUser.id).map(u => (
                                        <button key={u.id} onClick={() => setActiveChatId(u.id)} className={`w-full p-4 rounded-2xl text-left font-black text-sm ${activeChatId === u.id ? 'bg-indigo-600 text-white' : 'bg-white text-slate-400 border border-slate-100'}`}>{u.name}</button>
                                    ))}
                                </div>
                                <div className="flex-1 flex flex-col">
                                    <div className="flex-1 p-8 overflow-y-auto space-y-4">
                                        {(chatMessages[currentUser.role === 'leader' ? activeChatId : 'jenny'] || []).map(msg => (
                                            <div key={msg.id} className={`flex ${msg.sender === currentUser.id ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`p-4 rounded-2xl font-bold text-sm ${msg.sender === currentUser.id ? 'bg-indigo-600 text-white rounded-br-none' : 'bg-slate-100 text-slate-800 rounded-bl-none'}`}>{msg.text}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-6 border-t flex space-x-2">
                                        <input value={inputText} onChange={(e) => setInputText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendMessage()} placeholder="พิมพ์ข้อความ..." className="flex-1 bg-slate-50 px-6 py-4 rounded-2xl outline-none" />
                                        <button onClick={sendMessage} className="bg-indigo-600 text-white px-8 rounded-2xl font-black uppercase">Send</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {/* Tab อื่นๆ จะแสดงผลในลักษณะเดียวกัน */}
                        {(activeTab === 'praise' || activeTab === 'safe') && <div className="text-center py-20 text-slate-400 font-black italic uppercase">ระบบ {activeTab} กำลังเปิดใช้งานใน Phase ถัดไป</div>}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
